name: daily-crawl

on:
  schedule:
    - cron: "30 3 * * *"

  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Install dependencies
        run: npm ci

      - name: Crawl
        run: npx tsx apps/pipeline/src/cli.ts apps/pipeline/top-500.txt crawl.jsonl

      - name: Detect
        run: npx tsx apps/pipeline/src/detect-cli.ts crawl.jsonl detections.jsonl

      - name: Load
        run: npx tsx packages/db/src/load.ts crawl.jsonl detections.jsonl

      - name: Diff
        run: npx tsx packages/db/src/differ.ts
